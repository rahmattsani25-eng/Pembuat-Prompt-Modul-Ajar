<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Prompt Modul Ajar (Versi Ultimate Final)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 5px; }
        .form-group { margin-bottom: 20px; }
        label.title { font-weight: bold; display: block; margin-bottom: 8px; color: #2c3e50; }
        input[type="text"], select, textarea.input-box { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 15px; }
        textarea.input-box { font-family: inherit; height: 80px; resize: vertical; background-color: #fafafa; }
        
        /* Gaya khusus untuk Checkbox */
        .checkbox-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #f9f9f9; padding: 15px; border-radius: 5px; border: 1px solid #ddd; }
        .checkbox-group label { font-weight: normal; display: flex; align-items: center; cursor: pointer; font-size: 14px; }
        .checkbox-group input { margin-right: 10px; cursor: pointer; }

        button { background-color: #3498db; color: white; border: none; padding: 12px 20px; cursor: pointer; border-radius: 5px; font-size: 16px; width: 100%; margin-top: 15px; font-weight: bold; }
        button:hover { background-color: #2980b9; }
        
        .result-box { margin-top: 25px; display: none; }
        textarea.output-box { width: 100%; height: 540px; padding: 15px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-family: monospace; resize: vertical; background-color: #2c3e50; color: #ecf0f1; font-size: 14px; line-height: 1.5; }
        .btn-copy { background-color: #27ae60; margin-top: 10px; }
        .btn-copy:hover { background-color: #2ecc71; }
        .badge { display: block; width: max-content; margin: 10px auto 25px auto; padding: 5px 15px; background: #e74c3c; color: white; border-radius: 20px; font-size: 13px; font-weight: bold; }
        
        /* Gaya untuk Credit Developer */
        .credit { text-align: center; margin-top: 35px; padding-top: 15px; border-top: 1px solid #eee; font-size: 14px; color: #7f8c8d; }
        .credit strong { color: #2c3e50; }
    </style>
</head>
<body>

<div class="container">
    <h2>Pembuat Prompt Modul Ajar</h2>
    <span class="badge">Versi Ultimate Final (Full Otomatis Dropdown CP, TP & Banyak MPI)</span>
    
    <div class="form-group">
        <label class="title" for="penyusun">Nama Penyusun:</label>
        <input type="text" id="penyusun" placeholder="Contoh: Rahmat Gufron Tsani, S.Pd.,MCE">
    </div>

    <div class="form-group">
        <label class="title" for="kepsek">Nama Kepala Sekolah:</label>
        <input type="text" id="kepsek" placeholder="Contoh: Dr. H. Ahmad Sunarya, M.Pd.">
    </div>

    <div class="form-group">
        <label class="title" for="sekolah">Nama Sekolah:</label>
        <input type="text" id="sekolah" placeholder="Contoh: SMP Negeri 1 Nusantara">
    </div>

    <div class="form-group">
        <label class="title" for="lokasi">Lokasi Pembuatan RPP:</label>
        <input type="text" id="lokasi" placeholder="Contoh: Jakarta / Bandung">
    </div>

    <div class="form-group">
        <label class="title" for="tanggal_rpp">Hari dan Tanggal RPP Dibuat:</label>
        <input type="text" id="tanggal_rpp" placeholder="Contoh: Senin, 15 Juni 2026">
    </div>

    <hr style="border: 0; border-top: 1px solid #eee; margin: 25px 0;">

    <div class="form-group">
        <label class="title" for="mapel">Mata Pelajaran:</label>
        <select id="mapel" onchange="updateDropdownElemen()">
            <option value="">-- Pilih Mata Pelajaran --</option>
            <option value="Ilmu Pengetahuan Sosial (IPS)">Ilmu Pengetahuan Sosial (IPS)</option>
            <option value="Pendidikan Pancasila">Pendidikan Pancasila</option>
            <option value="Bahasa Indonesia">Bahasa Indonesia</option>
            <option value="Matematika">Matematika</option>
            <option value="Ilmu Pengetahuan Alam (IPA)">Ilmu Pengetahuan Alam (IPA)</option>
            <option value="Bahasa Inggris">Bahasa Inggris</option>
            <option value="Informatika">Informatika</option>
            <option value="Seni Budaya (Seni Rupa/Musik/Teater/Tari)">Seni Budaya</option>
            <option value="Pendidikan Jasmani, Olahraga, dan Kesehatan (PJOK)">Pendidikan Jasmani, Olahraga, dan Kesehatan (PJOK)</option>
            <option value="Fisika">Fisika (Fase E/F)</option>
            <option value="Kimia">Kimia (Fase E/F)</option>
            <option value="Biologi">Biologi (Fase E/F)</option>
        </select>
    </div>
    
    <div class="form-group">
        <label class="title" for="fase">Fase / Kelas:</label>
        <select id="fase">
            <option value="Fase A / Kelas 1 SD">Fase A / Kelas 1 SD</option>
            <option value="Fase A / Kelas 2 SD">Fase A / Kelas 2 SD</option>
            <option value="Fase B / Kelas 3 SD">Fase B / Kelas 3 SD</option>
            <option value="Fase B / Kelas 4 SD">Fase B / Kelas 4 SD</option>
            <option value="Fase C / Kelas 5 SD">Fase C / Kelas 5 SD</option>
            <option value="Fase C / Kelas 6 SD">Fase C / Kelas 6 SD</option>
            <option value="Fase D / Kelas 7 SMP">Fase D / Kelas 7 SMP</option>
            <option value="Fase D / Kelas 8 SMP">Fase D / Kelas 8 SMP</option>
            <option value="Fase D / Kelas 9 SMP">Fase D / Kelas 9 SMP</option>
            <option value="Fase E / Kelas 10 SMA/SMK">Fase E / Kelas 10 SMA/SMK</option>
            <option value="Fase F / Kelas 11 SMA/SMK">Fase F / Kelas 11 SMA/SMK</option>
            <option value="Fase F / Kelas 12 SMA/SMK">Fase F / Kelas 12 SMA/SMK</option>
        </select>
    </div>
    
    <div class="form-group">
        <label class="title" for="elemen">Elemen Capaian Pembelajaran (CP):</label>
        <select id="elemen" onchange="updateIsiTeksCP()">
            <option value="">-- Pilih Mata Pelajaran Terlebih Dahulu --</option>
        </select>
    </div>

    <div class="form-group">
        <label class="title" for="teksCP">Rumusan Capaian Pembelajaran (Bisa Diedit Manual):</label>
        <textarea id="teksCP" class="input-box" placeholder="Rumusan CP resmi dari BSKAP akan muncul otomatis di sini..."></textarea>
    </div>

    <div class="form-group">
        <label class="title" for="tp">Pilih Ruang Lingkup Tujuan Pembelajaran (TP):</label>
        <select id="tp">
            <option value="">-- Pilih Elemen CP Terlebih Dahulu --</option>
        </select>
    </div>
    
    <div class="form-group">
        <label class="title" for="topik">Bab / Topik Materi:</label>
        <input type="text" id="topik" placeholder="Contoh: Interaksi Keruangan dalam Kehidupan di Negara ASEAN">
    </div>
    
    <div class="form-group">
        <label class="title" for="waktu">Alokasi Waktu:</label>
        <select id="waktu">
            <option value="2 JP x 35 Menit (SD)">2 JP x 35 Menit (SD)</option>
            <option value="3 JP x 35 Menit (SD)">3 JP x 35 Menit (SD)</option>
            <option value="2 JP x 40 Menit (SMP)">2 JP x 40 Menit (SMP)</option>
            <option value="3 JP x 40 Menit (SMP)">3 JP x 40 Menit (SMP)</option>
            <option value="2 JP x 45 Menit (SMA/SMK)">2 JP x 45 Menit (SMA/SMK)</option>
            <option value="3 JP x 45 Menit (SMA/SMK)">3 JP x 45 Menit (SMA/SMK)</option>
        </select>
    </div>
    
    <div class="form-group">
        <label class="title">Dimensi Profil Lulusan (Profil Pelajar Pancasila):</label>
        <div class="checkbox-group">
            <label><input type="checkbox" value="Beriman, Bertakwa kepada Tuhan YME, dan Berakhlak Mulia"> Beriman & Bertakwa</label>
            <label><input type="checkbox" value="Berkebinekaan Global"> Berkebinekaan Global</label>
            <label><input type="checkbox" value="Bergotong Royong"> Bergotong Royong</label>
            <label><input type="checkbox" value="Mandiri"> Mandiri</label>
            <label><input type="checkbox" value="Bernalar Kritis"> Bernalar Kritis</label>
            <label><input type="checkbox" value="Kreatif"> Kreatif</label>
        </div>
    </div>

    <!-- FITUR BARU: PILIHAN MEDIA PEMBELAJARAN INTERAKTIF (MPI) YANG BANYAK -->
    <div class="form-group">
        <label class="title">Media Pembelajaran Interaktif (MPI) & Alat Digital Pendukung:</label>
        <div class="checkbox-group">
            <label><input type="checkbox" value="Quizizz / Kahoot (Kuis Gamifikasi)"> Quizizz / Kahoot</label>
            <label><input type="checkbox" value="Canva For Education (Presentasi & Infografis Interaktif)"> Canva Education</label>
            <label><input type="checkbox" value="Padlet / Jamboard (Papan Tulis Kolaboratif Digital)"> Padlet / Jamboard</label>
            <label><input type="checkbox" value="PhET Interactive Simulations (Simulasi Sains & Matematika)"> PhET Simulations</label>
            <label><input type="checkbox" value="Nearpod / Pear Deck (Presentasi Interaktif Terintegrasi Kuis)"> Nearpod / Pear Deck</label>
            <label><input type="checkbox" value="Wordwall (Game Edukasi Interaktif Match/Puzzle)"> Wordwall Games</label>
            <label><input type="checkbox" value="Google Earth / Maps (Eksplorasi Geografis & Ge spasial)"> Google Earth / Maps</label>
            <label><input type="checkbox" value="LiveWorksheets / Wizer.me (E-LKPD Interaktif)"> LiveWorksheets (E-LKPD)</label>
            <label><input type="checkbox" value="Mentimeter (Polling Opini & Brainstorming Real-time)"> Mentimeter (Polling)</label>
            <label><input type="checkbox" value="Edupuzzle (Video Pembelajaran Interaktif Bermuatan Kuis)"> Edupuzzle (Video Interaktif)</label>
            <label><input type="checkbox" value="Geogebra (Aplikasi Matematika Dinamis Geometri/Aljabar)"> Geogebra (Math Tools)</label>
            <label><input type="checkbox" value="Assemblr Edu (Media Pembelajaran Berbasis Augmented Reality - AR)"> Assemblr Edu (AR)</label>
        </div>
    </div>
    
    <div class="form-group">
        <label class="title" for="pendekatan">Pendekatan Pembelajaran:</label>
        <select id="pendekatan">
            <option value="Deep Learning (Pembelajaran Mendalam & Bermakna)">Deep Learning (Pembelajaran Mendalam)</option>
            <option value="Teaching at the Right Level (TaRL)">Teaching at the Right Level (TaRL)</option>
            <option value="Culturally Responsive Teaching (CRT)">Culturally Responsive Teaching (CRT)</option>
            <option value="Technological Pedagogical Content Knowledge (TPACK)">TPACK (Integrasi Teknologi)</option>
            <option value="Pendekatan Saintifik">Pendekatan Saintifik (5M)</option>
        </select>
    </div>

    <div class="form-group">
        <label class="title" for="model">Model Pembelajaran:</label>
        <select id="model">
            <option value="Problem Based Learning (PBL)">Problem Based Learning (PBL)</option>
            <option value="Project Based Learning (PjBL)">Project Based Learning (PjBL)</option>
            <option value="Discovery Learning">Discovery Learning</option>
            <option value="Inquiry Learning">Inquiry Learning</option>
            <option value="Jigsaw (Kooperatif)">Jigsaw (Kooperatif)</option>
            <option value="Think-Pair-Share (Kooperatif)">Think-Pair-Share (Kooperatif)</option>
        </select>
    </div>

    <button onclick="generatePrompt()">Buat Prompt Modul Ajar</button>

    <div class="result-box" id="resultBox">
        <label class="title">Hasil Prompt (Salin teks ini dan tempel ke AI):</label>
        <textarea id="promptOutput" class="output-box" readonly></textarea>
        <button class="btn-copy" onclick="copyPrompt()">Salin Prompt</button>
    </div>

    <div class="credit">
        Dikembangkan oleh: <br> <strong>Rahmat Gufron Tsani, S.Pd.,MCE</strong>
    </div>

</div>

<script>

    function updateDropdownElemen() {
        const mapelSelect = document.getElementById("mapel");
        const elemenSelect = document.getElementById("elemen");
        const teksCP = document.getElementById("teksCP");
        const tpSelect = document.getElementById("tp");
        const selectedMapel = mapelSelect.value;

        // Reset dropdown elemen, teks CP, dan dropdown TP
        elemenSelect.innerHTML = "";
        teksCP.value = "";
        tpSelect.innerHTML = '<option value="">-- Pilih Elemen CP Terlebih Dahulu --</option>';

        if (!selectedMapel || !databaseCP[selectedMapel]) {
            elemenSelect.innerHTML = '<option value="">-- Pilih Mata Pelajaran Terlebih Dahulu --</option>';
            return;
        }

        // Isi elemen berdasarkan mapel yang dipilih
        databaseCP[selectedMapel].forEach((item, index) => {
            const option = document.createElement("option");
            option.value = item.elemen;
            option.text = item.elemen;
            if (index === 0) option.selected = true; 
            elemenSelect.appendChild(option);
        });

        // Trigger pengisian teks CP dan TP pertama kali
        updateIsiTeksCP();
    }

    function updateIsiTeksCP() {
        const mapelSelected = document.getElementById("mapel").value;
        const elemenSelected = document.getElementById("elemen").value;
        const teksCP = document.getElementById("teksCP");
        const tpSelect = document.getElementById("tp");

        // Reset dropdown TP
        tpSelect.innerHTML = "";

        if (mapelSelected && elemenSelected && databaseCP[mapelSelected]) {
            const dataPilihan = databaseCP[mapelSelected].find(item => item.elemen === elemenSelected);
            if (dataPilihan) {
                teksCP.value = dataPilihan.teks;
                
                // Isi Dropdown TP otomatis dari database
                dataPilihan.tp.forEach((targetTP, idx) => {
                    const opt = document.createElement("option");
                    opt.value = targetTP;
                    opt.text = targetTP;
                    if (idx === 0) opt.selected = true;
                    tpSelect.appendChild(opt);
                });
            }
        }
    }

    function generatePrompt() {
        const penyusun = document.getElementById('penyusun').value || "[Nama Penyusun]";
        const kepsek = document.getElementById('kepsek').value || "[Nama Kepala Sekolah]";
        const sekolah = document.getElementById('sekolah').value || "[Nama Sekolah]";
        const lokasi = document.getElementById('lokasi').value || "[Lokasi]";
        const tanggal_rpp = document.getElementById('tanggal_rpp').value || "[Hari dan Tanggal RPP Dibuat]";
        const mapel = document.getElementById('mapel').value || "[Mata Pelajaran]";
        const fase = document.getElementById('fase').value;
        const elemen = document.getElementById('elemen').value || "[Elemen CP]";
        const rumusanCP = document.getElementById('teksCP').value || "[Rumusan Teks CP]";
        const rumusanTP = document.getElementById('tp').value || "[Tujuan Pembelajaran]";
        const topik = document.getElementById('topik').value || "[Bab / Topik Materi]";
        const waktu = document.getElementById('waktu').value;
        const pendekatan = document.getElementById('pendekatan').value;
        const model = document.getElementById('model').value;
        
        // Mengambil data Checkbox Profil Pelajar Pancasila
        const profilCheckboxes = document.querySelectorAll('.checkbox-group input[type="checkbox"]:checked');
        let profilArray = [];
        let mpiArray = [];
        
        // Memisahkan logika pengambilan checkbox (P3 vs MPI) berdasarkan value/konteks kontainer
        const allCheckboxes = document.querySelectorAll('input[type="checkbox"]:checked');
        allCheckboxes.forEach((cb) => {
            // Jika checkbox bagian dari dimensi P3 atau MPI
            if(["Beriman, Bertakwa kepada Tuhan YME, dan Berakhlak Mulia", "Berkebinekaan Global", "Bergotong Royong", "Mandiri", "Bernalar Kritis", "Kreatif"].includes(cb.value)) {
                profilArray.push(cb.value);
            } else {
                mpiArray.push(cb.value);
            }
        });

        const profil = profilArray.length > 0 ? profilArray.join(', ') : "[Dimensi Profil Lulusan]";
        const mpiTerpilih = mpiArray.length > 0 ? mpiArray.join(', ') : "Disesuaikan otomatis secara kreatif oleh AI";
        
        const promptText = `Bertindaklah sebagai Ahli Kurikulum, Fasilitator Kurikulum Merdeka, dan Asesor Perangkat Ajar Senior di Indonesia yang sangat menguasai regulasi terbaru. Buatkan Modul Ajar kurikulum merdeka kategori "Sangat Baik" (skor 95-100) berbasis data input berikut:

* Nama Penyusun: ${penyusun}
* Nama Kepala Sekolah: ${kepsek}
* Nama Sekolah: ${sekolah}
* Lokasi Pembuatan RPP: ${lokasi}
* Hari dan Tanggal RPP Dibuat: ${tanggal_rpp}
* Mata Pelajaran: ${mapel}
* Fase / Kelas: ${fase}
* Elemen CP: ${elemen}
* Teks Rumusan CP: ${rumusanCP}
* Tujuan Pembelajaran Utama (TP): ${rumusanTP}
* Bab / Topik Materi Input: ${topik}
* Alokasi Waktu Terpilih: ${waktu}
* Dimensi Profil Lulusan (Pelajar Pancasila): ${profil}
* Media Pembelajaran Interaktif (MPI) Wajib Terintegrasi: ${mpiTerpilih}
* Pendekatan Pembelajaran: ${pendekatan}
* Model Pembelajaran: ${model}

[INSTRUKSI MUTLAK PERBAIKAN SUBSTANTIF ASESOR - WAJIB DIINTEGRASIKAN SECARA UTUH]:
Untuk mencapai kategori nilai kelayakan 95-100 (Sangat Baik) saat supervisi pengawas sekolah, Anda WAJIB memperbaiki 14 poin celah kritis perangkat berikut ke dalam modul ini secara eksplisit:

1. Penyesuaian Materi Abstrak pada Fase A (Skenario Khusus Bahasa Inggris Kelas 1 SD): 
   Jika yang dipilih adalah materi tingkat tinggi/abstrak seperti "Future Plans/Dream Jobs" di jenjang Fase A SD, Anda WAJIB menambahkan bagian "Catatan Adaptasi Pembelajaran" di Informasi Umum: jelaskan bahwa materi disajikan secara sederhana melalui pengenalan cita-cita konkret terdekat siswa dengan bantuan visual penuh (flashcards), permainan interaktif, dan model struktur kalimat lisan yang sangat sederhana demi menjaga keselarasan tingkat perkembangan psikologis anak.
2. Koreksi Topik Judul Bab Materi: 
   Jika topik input tertulis istilah teoretis umum seperti "Tenses", ubah dan sesuaikan judul bab tersebut menjadi lebih komunikatif, konkret, dan berbasis tema yang berfokus pada siswa, seperti: "My Future Dream / Future Plans" atau "Jobs and Dreams".
3. Implementasi Eksplisit Media Pembelajaran Interaktif (MPI):
   Wajib integrasikan MPI terpilih (${mpiTerpilih}) ke dalam langkah-langkah skenario pembelajaran (Kegiatan Inti atau Asesmen). Berikan penjelasan detail bagaimana guru mengoperasikan media digital tersebut dan bagaimana siswa berinteraksi dengannya agar tercipta pembelajaran berbasis TPACK yang interaktif.
4. Implementasi Utuh Tiga Unsur Deep Learning:
   Jangan hanya mencantumkan istilah pendekatan Deep Learning. Buatkan sebuah tabel pemetaan taktis yang menjabarkan implementasi nyata dari 3 pilar utamanya di kelas:
   - Mindful Learning (Belajar dengan kesadaran penuh, refleksi diri atas materi).
   - Meaningful Learning (Belajar bermakna menghubungkan materi dengan realitas kehidupan nyata).
   - Joyful Learning (Belajar yang menyenangkan melalui keterlibatan emosional aktif).
5. Penyelarasan TP dengan Topik Fiksi:
   Pastikan rumusan Tujuan Pembelajaran (TP) diselaraskan secara eksplisit dengan konteks, teks, atau elemen cerita fiksi yang relevan, sehingga kompetensi yang disasar tercermin melalui analisis atau kreasi karya fiksi yang kontekstual.
6. Memperinci Kriteria Ketercapaian Tujuan Pembelajaran (KKTP):
   Uraikan KKTP menjadi indikator-indikator performa yang detail, operasional, dan dapat diukur. Hindari rumusan yang terlalu umum agar guru dapat memetakan posisi pemahaman siswa secara objektif.
7. Menyempurnakan Rubrik Unjuk Kerja:
   Buat rubrik penilaian performa/unjuk kerja yang komprehensif, dilengkapi deskriptor pencapaian yang jelas untuk setiap tingkatan kriteria (misalnya: Perlu Bimbingan, Cukup, Baik, Sangat Baik) agar evaluasi hasil karya atau presentasi siswa bersifat transparan.
8. Memperkuat LKPD Menyimak:
   Sediakan Lembar Kerja Peserta Didik (LKPD) khusus untuk aktivitas menyimak yang dilengkapi dengan panduan pertanyaan berjenjang (LOTS hingga HOTS), kolom pencatatan kata kunci, atau penugasan respons kreatif berbasis materi audio/lisan yang diperdengarkan.
9. Menambahkan Diferensiasi Pembelajaran:
   Integrasikan strategi pembelajaran berdiferensiasi secara nyata yang mencakup tiga aspek:
   - Diferensiasi Konten (menyediakan ragam format bahan ajar).
   - Diferensiasi Proses (menyediakan variasi tingkat bantuan atau scaffolding berkelompok).
   - Diferensiasi Produk (memberikan kebebasan bentuk hasil tugas akhir sesuai minat dan profil belajar siswa).
10. Menambahkan Lampiran Instrumen Lengkap:
    Sajikan seluruh instrumen pendukung asesmen secara utuh di bagian lampiran, yang terdiri dari instrumen asesmen diagnostik awal (kognitif/non-kognitif), format asesmen formatif selama proses berjalan, hingga lembar soal asesmen sumatif beserta kunci jawaban dan pedoman penskorannya.`;

        document.getElementById('promptOutput').value = promptText;
        document.getElementById('resultBox').style.display = 'block';
    }

    function copyPrompt() {
        const copyText = document.getElementById("promptOutput");

        navigator.clipboard.writeText(copyText.value);
